<div class="post-form">
  <h2>{{ isEdit ? 'Edit Post' : 'Create New Post' }}</h2>

  <div class="form-group">
    <label>Title *</label>
    <input type="text" [(ngModel)]="form.title" placeholder="Post title" class="form-input" />
  </div>

  <div class="form-group">
    <label>Author</label>
    <input type="text" [(ngModel)]="form.author" placeholder="Your name" class="form-input" />
  </div>

  <div class="form-group">
    <label>Content *</label>
    <textarea [(ngModel)]="form.content" placeholder="Write your post..." rows="10" class="form-input"></textarea>
  </div>

  <div class="form-actions">
    <button class="btn btn-primary" (click)="submit()">{{ isEdit ? 'Update' : 'Publish' }}</button>
    <button class="btn btn-cancel" (click)="cancelled.emit()">Cancel</button>
  </div>
</div>
