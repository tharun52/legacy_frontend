<div class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>
    <div class="error-msg" *ngIf="error">{{ error }}</div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" class="form-input" placeholder="Enter username" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" class="form-input" placeholder="Enter password" (keyup.enter)="login()" />
    </div>
    <button class="btn btn-primary btn-full" (click)="login()" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>
    <p class="auth-link">Don't have an account? <a routerLink="/register">Register</a></p>
  </div>
</div>
